name: Test, Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore: 
      - '*.md'
  pull_request:
    branches:
      - main
    paths-ignore: 
      - '*.md'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Generate coverage summary
        run: |
          {
            echo "## 📊 Test Coverage Report"
            echo ""
            echo "| Metric | Result |"
            echo "|--------|--------|"

            if [ -f coverage/coverage-summary.json ]; then
              LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
              STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
              FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
              BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)

              echo "| Lines | ${LINES}% |"
              echo "| Statements | ${STATEMENTS}% |"
              echo "| Functions | ${FUNCTIONS}% |"
              echo "| Branches | ${BRANCHES}% |"
            else
              echo "| Status | Coverage report non disponible |"
            fi
            echo ""
            echo "[📁 Voir le rapport de couverture détaillé](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="coverage"
          COVERAGE_DIR="$GITHUB_WORKSPACE/coverage"
          PUBLISH_DIR="$RUNNER_TEMP/coverage-branch"

          rm -rf "$PUBLISH_DIR"

          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          # Récupération de la branche si elle existe déjà
          if git fetch origin \
            "$BRANCH:refs/remotes/origin/$BRANCH"
          then
            git worktree add \
              --detach \
              "$PUBLISH_DIR" \
              "refs/remotes/origin/$BRANCH"
          else
            # Première publication : création d'une branche sans parent
            git worktree add --detach "$PUBLISH_DIR"
            git -C "$PUBLISH_DIR" switch --orphan "$BRANCH"
          fi

          # Supprime tout le contenu actuel de la branche,
          # sans supprimer le fichier interne .git du worktree
          find "$PUBLISH_DIR" \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          # Copie le contenu de coverage/ à la racine de la branche
          cp -a "$COVERAGE_DIR"/. "$PUBLISH_DIR"/

          git -C "$PUBLISH_DIR" add --all

          if git -C "$PUBLISH_DIR" diff --cached --quiet; then
            echo "Aucune modification du coverage"
            exit 0
          fi

          git -C "$PUBLISH_DIR" commit \
            -m "chore: update coverage"

          git -C "$PUBLISH_DIR" push \
            origin \
            "HEAD:$BRANCH"

      - name: Test success
        run: |
          echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Build success
        run: |
          echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload files to AlwaysData
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALWAYSDATA_HOST }}
          username: ${{ secrets.ALWAYSDATA_USER }}
          password: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          source: dist/*
          target: ${{ secrets.ALWAYSDATA_DEPLOY_PATH }}
          strip_components: 1
          overwrite: true
          rm: true

      - name: Deployment success
        run: |
          echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to AlwaysData" >> $GITHUB_STEP_SUMMARY
